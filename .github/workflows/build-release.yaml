name: Build and Release

on:  # トリガーイベント
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # 手動トリガー

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.26.2"]
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        binary_suffix: ["", ".exe", ""]  # Windowsは.exeを付与

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }} 
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_suffix }}"
          go build -o "${BINARY_NAME}" -trimpath -ldflags="-s -w" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-table-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cleaning-table-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          find artifacts -type f -exec cp {} release-assets/ \;

          cp ipaexg.ttf release-assets/
          cp test.xlsx release-assets/

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ### 同梱ファイル
            - `ipaexg.ttf` - PDF出力用日本語フォント
            - `test.xlsx` - テスト用エクセルファイル

            ### 使い方
            1. OS/アーキテクチャに合ったバイナリをダウンロード
            2. `ipaexg.ttf` と `test.xlsx` を同じディレクトリに配置
            3. バイナリを実行
          files: release-assets/*
          generate_release_notes: false
