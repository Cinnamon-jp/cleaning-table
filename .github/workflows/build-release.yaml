name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            binary_suffix: ""
          - goos: linux
            goarch: arm64
            binary_suffix: ""
          # Windows
          - goos: windows
            goarch: amd64
            binary_suffix: ".exe"
          - goos: windows
            goarch: arm64
            binary_suffix: ".exe"
          # macOS
          - goos: darwin
            goarch: amd64
            binary_suffix: ""
          - goos: darwin
            goarch: arm64
            binary_suffix: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="cleaning-table-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_suffix }}"
          go build -o "${BINARY_NAME}" -trimpath -ldflags="-s -w" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-table-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cleaning-table-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_suffix }}

  release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # バイナリファイルを収集
          find artifacts -type f -exec cp {} release-assets/ \;

          # ipaexg.ttf と test.xlsx をコピー
          cp ipaexg.ttf release-assets/
          cp test.xlsx release-assets/

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## 掃除当番表ジェネレーター

            ### ダウンロード

            | OS | アーキテクチャ | ファイル名 |
            |---|---|---|
            | Linux | amd64 | `cleaning-table-linux-amd64` |
            | Linux | arm64 | `cleaning-table-linux-arm64` |
            | Windows | amd64 | `cleaning-table-windows-amd64.exe` |
            | Windows | arm64 | `cleaning-table-windows-arm64.exe` |
            | macOS | amd64 | `cleaning-table-darwin-amd64` |
            | macOS | arm64 | `cleaning-table-darwin-arm64` |

            ### 同梱ファイル
            - `ipaexg.ttf` - PDF出力用日本語フォント
            - `test.xlsx` - テスト用エクセルファイル

            ### 使い方
            1. OS/アーキテクチャに合ったバイナリをダウンロード
            2. `ipaexg.ttf` と `test.xlsx` を同じディレクトリに配置
            3. バイナリを実行
          files: release-assets/*
          generate_release_notes: false
