version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - gocritic
    - errorlint
    - revive
    - loggercheck
    - nilerr
    - modernize
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - shadow
    staticcheck:
      checks: ["all"]
    unused:
      exported-fields-are-used: true

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
      module-path: "cleaning-table"
    goimports:
      local-prefixes: ["cleaning-table"]

issues:
  max-issues-per-linter: 50
  max-same-issues: 0

output:
  show-stats: true
  sort-order: ["linter", "severity", "file"]

run:
  timeout: "5m"

severity:
  default: "warning"
